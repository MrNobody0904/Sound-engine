<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUND ENGINE </title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <div class="logo">SOUND<span>ENGINE</span></div>
    <div class="live-badge"><span class="status-dot"></span>LIVE EQ</div>
  </header>

  <!-- Drop Zone sarri file yahi pe dalegi -->
  <div class="drop-zone" id="dropZone">
    <p>DROP AUDIO FILE HERE — OR <span onclick="document.getElementById('file-input').click()">BROWSE</span></p>
    <input type="file" id="file-input" accept="audio/*">
  </div>

  <!-- Track information rehti h -->
  <div class="track-info" id="trackInfo">
    <div class="track-icon">🎵</div>
    <div class="track-meta">
      <div class="track-name" id="trackName">NO TRACK LOADED</div>
      <div class="track-sub" id="trackSub">LOAD A FILE OR USE MICROPHONE INPUT</div>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>

  <!-- jaadu -->
  <div class="controls-row">
    <button class="btn" id="playBtn" onclick="togglePlay()">▶ PLAY</button>
    <button class="btn" onclick="stopAudio()">■ STOP</button>
    <button class="btn danger" id="micBtn" onclick="toggleMic()">⦿ MIC INPUT</button>
    <div class="volume-wrap">
      <span class="vol-label">VOL</span>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
    </div>
  </div>

  <!-- Visualizer -->
  <div class="visualizer-wrap">
    <div class="vis-label">FREQUENCY SPECTRUM</div>
    <canvas id="visualizer"></canvas>
    <canvas id="waveform"></canvas>
  </div>

  <!-- Eq section -->
  <div class="eq-section">
    <div class="section-title">// EQUALIZER</div>
    <div class="eq-grid" id="eqGrid">
      <!-- EQ band by js -->
    </div>
    <div class="presets">
      <button class="preset-btn" onclick="applyPreset('flat')">FLAT</button>
      <button class="preset-btn" onclick="applyPreset('bass')">BASS BOOST</button>
      <button class="preset-btn" onclick="applyPreset('treble')">TREBLE</button>
      <button class="preset-btn" onclick="applyPreset('vocal')">VOCAL</button>
      <button class="preset-btn" onclick="applyPreset('rock')">ROCK</button>
      <button class="preset-btn" onclick="applyPreset('electronic')">ELECTRONIC</button>
      <button class="preset-btn" onclick="applyPreset('jazz')">JAZZ</button>
    </div>
  </div>

  <!-- Effects -->
  <div class="effects-row" id="effectsRow">
    <div class="effect-card">
      <div class="effect-name">REVERB</div>
      <div class="knob-wrap">
        <div class="knob" id="reverbKnob" style="background: conic-gradient(var(--accent) 0deg, var(--border) 0deg)"></div>
        <span class="knob-val" id="reverbVal">0%</span>
        <input type="range" min="0" max="100" value="0" style="width:80px" oninput="updateKnob('reverb', this.value)">
      </div>
    </div>
    <div class="effect-card">
      <div class="effect-name">COMPRESSOR</div>
      <div class="knob-wrap">
        <div class="knob" id="compKnob"></div>
        <span class="knob-val" id="compVal">50%</span>
        <input type="range" min="0" max="100" value="50" style="width:80px" oninput="updateKnob('comp', this.value)">
      </div>
    </div>
    <div class="effect-card">
      <div class="effect-name">STEREO WIDTH</div>
      <div class="knob-wrap">
        <div class="knob" id="stereoKnob"></div>
        <span class="knob-val" id="stereoVal">50%</span>
        <input type="range" min="0" max="100" value="50" style="width:80px" oninput="updateKnob('stereo', this.value)">
      </div>
    </div>
    <div class="effect-card">
      <div class="effect-name">GAIN</div>
      <div class="knob-wrap">
        <div class="knob" id="gainKnob"></div>
        <span class="knob-val" id="gainVal">50%</span>
        <input type="range" min="0" max="100" value="50" style="width:80px" oninput="updateKnob('gain', this.value)">
      </div>
    </div>
  </div>

  <!-- info bar -->
  <div class="info-bar">
    <div class="info-item">SAMPLE RATE <span id="sampleRate">—</span></div>
    <div class="info-item">BIT DEPTH <span>32-BIT FLOAT</span></div>
    <div class="info-item">LATENCY <span id="latency">—</span></div>
    <div class="info-item">CHANNELS <span id="channels">—</span></div>
    <div class="info-item">STATUS <span id="statusText">IDLE</span></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
